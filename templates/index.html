<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PrenceYours 2026" />
  <!-- Open Graph / 微信分享卡片 -->
  <meta property="og:title" content="PrenceYours 2026 · 智能多维热榜" />
  <meta property="og:description" content="PrenceYours 2026 - 智能聚合微博、百度、抖音、B站、虎嗅、财联社、国际头条，支持领域筛选+历史回溯" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/static/icons/icon-512x512.png" />
  <meta property="og:locale" content="zh_CN" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png" />
  <title>PrenceYours 2026 · 智能多维热榜</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3.0.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet" onerror="document.documentElement.classList.add('fonts-failed')" />
  <!-- 国内字体回退：lxgw字体CDN -->
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet" onerror="document.documentElement.classList.add('fonts-failed')" />
</head>
<body>

<!-- 动态粒子背景 -->
<canvas id="particleCanvas"></canvas>

<!-- 主容器 -->
<div class="app-shell">

  <!-- 顶部搜索栏 -->
  <header class="top-bar">
    <div class="top-bar-inner">
      <div class="logo-area">
        <span class="logo-fire">🔥</span>
        <span class="logo-text">PrenceYours</span>
      </div>
      <div class="search-box" id="searchBox">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索热点..." autocomplete="off" />
        <button class="search-clear hidden" id="searchClear">&times;</button>
      </div>
      <div class="top-actions">
        <span class="live-pulse" id="livePulse">
          <span class="pulse-dot"></span>
          <span class="pulse-text">LIVE</span>
        </span>
        <button class="icon-btn" id="settingsBtn" title="平台设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <button class="icon-btn" id="installTopBtn" title="安装APP">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
        <button class="icon-btn" id="refreshBtn" title="刷新">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- 时间快捷选择 -->
  <nav class="time-strip" id="timeStrip">
    <button class="time-btn active" data-time="today">今天</button>
    <button class="time-btn" data-time="yesterday">昨天</button>
    <button class="time-btn" data-time="day_before">前天</button>
    <button class="time-btn" data-time="week">近7天</button>
    <!-- 7天日期pill -->
    <div class="date-pills-inline" id="datePillsInline"></div>
  </nav>

  <!-- 领域标签筛选 -->
  <div class="tag-strip" id="tagStrip">
    <button class="tag-btn active" data-tag="全部">全部</button>
    <button class="tag-btn" data-tag="科技">科技</button>
    <button class="tag-btn" data-tag="AI">AI</button>
    <button class="tag-btn" data-tag="教育">教育</button>
    <button class="tag-btn" data-tag="综艺">综艺</button>
    <button class="tag-btn" data-tag="国家事件">国家事件</button>
    <button class="tag-btn" data-tag="犯罪">犯罪</button>
    <button class="tag-btn" data-tag="国际">国际</button>
    <button class="tag-btn" data-tag="财经">财经</button>
  </div>

  <!-- 平台 Tab 切换 -->
  <div class="source-tabs" id="sourceTabs">
    <button class="tab active" data-source="all">
      <span class="tab-icon">🌐</span><span class="tab-label">全部</span>
    </button>
    <!-- JS动态生成平台tab -->
  </div>

  <!-- 热点卡片列表 -->
  <main class="feed" id="feedContainer">
    <div class="loading-card" id="loadingState">
      <div class="loader">
        <div class="loader-bar"></div>
        <div class="loader-bar"></div>
        <div class="loader-bar"></div>
      </div>
      <p>正在获取热点数据...</p>
    </div>
    <div class="error-card hidden" id="errorState">
      <span>⚠️</span>
      <p>加载失败，请稍后重试</p>
      <button class="retry-pill" onclick="loadHotspots()">重试</button>
    </div>
  </main>

  <!-- 底部工具栏 -->
  <footer class="bottom-bar">
    <div class="bottom-left">
      <span class="update-ts" id="updateTime">--:--</span>
      <span class="stat-count" id="statsCount">0 条</span>
    </div>
    <div class="bottom-right">
      <button class="action-pill share-pill" id="shareBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
        分享
      </button>
    </div>
  </footer>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 热点详情弹窗 -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-rank" id="modalRank"></div>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div class="modal-tags" id="modalTags"></div>
    <div class="modal-summary" id="modalSummary"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <a class="modal-link" id="modalLink" href="#" target="_blank">
      查看原文 →
    </a>
  </div>
</div>

<!-- 平台设置弹窗 -->
<div class="modal-overlay hidden" id="settingsOverlay">
  <div class="modal-card settings-modal" id="settingsCard">
    <button class="modal-close" id="settingsClose">&times;</button>
    <h2 class="settings-title">平台管理</h2>
    <p class="settings-subtitle">选择要显示的热点来源平台</p>
    <div class="settings-platforms" id="settingsPlatforms">
      <!-- JS动态生成 -->
    </div>
    <button class="settings-save-btn" id="settingsSaveBtn">保存设置</button>
  </div>
</div>

<!-- 安装引导弹窗 -->
<div class="modal-overlay hidden" id="installOverlay">
  <div class="modal-card install-modal" id="installCard">
    <button class="modal-close" id="installClose">&times;</button>
    <div class="install-icon-wrap">
      <img src="/static/icons/icon-192x192.png" alt="每日热点" class="install-app-icon" onerror="this.style.display='none'" />
    </div>
    <h2 class="install-title">安装「每日热点」</h2>
    <p class="install-subtitle">添加到桌面，像APP一样快速打开</p>
    <div class="install-steps" id="installSteps">
      <!-- 动态填充 -->
    </div>
    <button class="install-action-btn" id="installActionBtn" style="display:none">
      立即安装
    </button>
  </div>
</div>


<script>
// 注册 Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('SW 注册成功', reg.scope);
    }).catch(err => console.log('SW 注册失败', err));
  });
}
</script>
<script src="{{ url_for('static', filename='js/main.js') }}?v=3.0.0"></script>
</body>
</html>
